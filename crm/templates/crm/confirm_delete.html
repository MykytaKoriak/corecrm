{% extends "crm/base.html" %}
{% block title %}Удаление · CRM{% endblock %}
{% block content %}
<div class="surface delete-card">
  <h1>Удалить объект?</h1>
  <p>{{ object }}</p>
  <form method="post" class="d-flex gap-2">
    {% csrf_token %}
    <button class="btn danger-btn">Удалить</button>
    <a class="btn secondary-btn" href="{{ object.get_absolute_url }}">Отмена</a>
  </form>
</div>
{% endblock %}
